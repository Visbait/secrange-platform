server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  # SPA fallback
  location / { try_files $uri $uri/ /index.html; }
  # API reverse-proxy (in prod the LB usually does this instead)
  location /api/ { proxy_pass http://api:4000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
}
